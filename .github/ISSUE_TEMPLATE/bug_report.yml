name: Bug report
description: Report something that isn't working
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! Please redact any private URLs, usernames, or thread contents before posting.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead? Include steps to reproduce.
    validations:
      required: true
  - type: textarea
    id: export-diagnostics
    attributes:
      label: Export diagnostics (if relevant)
      description: >
        If shares are missing or mis-classified, paste the `summary` and
        `skippedShares` sections of your export (with private data redacted).
        The `itemType` and skip `reason` values are the most useful clues.
      render: json
    validations:
      required: false
  - type: input
    id: ext-version
    attributes:
      label: Extension version
      description: From extension/manifest.json (e.g. 3.1.0).
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and version
      description: e.g. Chrome 141 on macOS 15.
    validations:
      required: true
